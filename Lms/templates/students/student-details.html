<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Profile</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/feather-icons"></script>

</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen flex items-center justify-center p-10">

<div class="bg-white shadow-xl rounded-2xl w-[800px] overflow-hidden">

<!-- Top Profile Section -->
<div class="bg-blue-600 p-8 text-white flex items-center gap-6">

<div class="w-20 h-20 rounded-full bg-white text-blue-600 flex items-center justify-center text-3xl font-bold">
{{student.stu_name[0]}}
</div>

<div>
<h1 class="text-2xl font-semibold">{{student.stu_name}}</h1>
<p class="text-blue-100">Student Profile</p>
</div>

</div>

<!-- Details Section -->
<div class="grid grid-cols-2 gap-6 p-8">

<div class="bg-gray-50 p-4 rounded-lg">
<p class="text-sm text-gray-500">Student ID</p>
<p class="text-lg font-semibold text-gray-800">{{student.id}}</p>
</div>

<div class="bg-gray-50 p-4 rounded-lg">
<p class="text-sm text-gray-500">Age</p>
<p class="text-lg font-semibold text-gray-800">{{student.stu_age}}</p>
</div>

<div class="bg-gray-50 p-4 rounded-lg">
<p class="text-sm text-gray-500">Email</p>
<p class="text-lg font-semibold text-blue-600">{{student.stu_email}}</p>
</div>

<div class="bg-gray-50 p-4 rounded-lg">
<p class="text-sm text-gray-500">Phone</p>
<p class="text-lg font-semibold text-gray-800">{{student.stu_phone}}</p>
</div>

<div class="bg-gray-50 p-4 rounded-lg col-span-2">
<p class="text-sm text-gray-500">Address</p>
<p class="text-lg font-semibold text-gray-800">{{student.stu_address}}</p>
</div>

</div>

<!-- Action Buttons -->
<div class="flex justify-between p-6 border-t bg-gray-50">

<a href="{{url_for('student.all_students_data')}}">
<button class="flex items-center gap-2 px-5 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">
<i data-feather="arrow-left"></i>
Back
</button>
</a>

<a href="{{url_for('student.students_update',id=student.id)}}">
<button class="flex items-center gap-2 px-5 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600">
<i data-feather="edit"></i>
Edit
</button>
</a>

</div>

</div>

<script>
feather.replace()
</script>

</body>
</html>
