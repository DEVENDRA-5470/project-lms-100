<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.container{
    background:white;
    width:420px;
    padding:35px;
    border-radius:12px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.title{
    text-align:center;
    color:#333;
    margin-bottom:25px;
    font-size:26px;
}

.form-group{
    margin-bottom:15px;
}

.form-group p{
    margin:5px 0;
    font-weight:600;
    color:#444;
}

.form-control{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
    outline:none;
}

textarea.form-control{
    height:80px;
    resize:none;
}

.button-group{
    display:flex;
    gap:10px;
}

.btn{
    flex:1;
    padding:12px;
    border:none;
    color:white;
    font-size:15px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.btn-submit{
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.btn-reset{
    background:#e74c3c;
}

</style>
</head>

<body>

<div class="container">

<h1 class="title">Student Registration</h1>

<form action="" method="post" enctype="multipart/form-data">

<div class="form-group">
<p>Full Name</p>
<input type="text" name="stu_name" class="form-control" placeholder="Enter Your Full Name">
</div>

<div class="form-group">
<p>Student Age</p>
<input type="date" name="stu_age" class="form-control">
</div>

<div class="form-group">
<p>Student Email</p>
<input type="email" name="stu_email" class="form-control" placeholder="Enter Email ID">
</div>

<div class="form-group">
<p>Student Mobile</p>
<input type="number" name="stu_phone" class="form-control" placeholder="Enter Mobile No">
</div>

<div class="form-group">
<p>Student Address</p>
<textarea name="stu_address" class="form-control"></textarea>
</div>

<div class="button-group">
<button type="submit" class="btn btn-submit">Register</button>
<button type="reset" class="btn btn-reset">Reset</button>
</div>

</form>

</div>

</body>
</html>
